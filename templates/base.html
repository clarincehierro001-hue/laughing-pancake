<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Operation Team dashboard" />
    <title>{% block title %}Operation Team{% endblock %}</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #f4f7fb;
            --surface: #ffffff;
            --surface-soft: #f9fbfd;
            --text: #1f2937;
            --muted: #6b7280;
            --primary: #1f4f82;
            --primary-dark: #163a5f;
            --border: #e5e7eb;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            --radius: 16px;
            --max-width: 1100px;
        }

        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(180deg, #eef3f9 0%, var(--bg) 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        header {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 1.25rem 2rem;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.12);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-container {
            max-width: var(--max-width);
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .brand {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }

        .brand h1 {
            margin: 0;
            font-size: 1.35rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .brand p {
            margin: 0;
            font-size: 0.92rem;
            color: rgba(255, 255, 255, 0.82);
        }

        nav {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        nav a {
            padding: 0.55rem 0.9rem;
            border-radius: 10px;
            color: white;
            font-size: 0.95rem;
            transition: background 0.2s ease, transform 0.2s ease;
        }

        nav a:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateY(-1px);
        }

        main {
            flex: 1;
            width: 100%;
            max-width: var(--max-width);
            margin: 2rem auto;
            padding: 0 1rem 2rem;
        }

        .page-header {
            margin-bottom: 1.25rem;
        }

        .page-header h2 {
            margin: 0 0 0.35rem;
            font-size: 1.7rem;
            font-weight: 700;
            color: var(--text);
        }

        .page-header p {
            margin: 0;
            color: var(--muted);
            font-size: 0.98rem;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.75rem;
            box-shadow: var(--shadow);
        }

        footer {
            margin-top: auto;
            text-align: center;
            padding: 1.25rem 1rem 2rem;
            font-size: 0.92rem;
            color: var(--muted);
        }

        @media (max-width: 768px) {
            header {
                padding: 1rem 1rem;
            }

            .brand h1 {
                font-size: 1.15rem;
            }

            main {
                margin: 1.25rem auto;
                padding: 0 0.85rem 1.5rem;
            }

            .card {
                padding: 1.25rem;
                border-radius: 14px;
            }

            .page-header h2 {
                font-size: 1.4rem;
            }

            nav {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-container">
            <div class="brand">
                <h1>Operation Team</h1>
                <p>Management Dashboard</p>
            </div>

            <nav>
                <a href="/">Home</a>
                <a href="/about">About</a>
                <a href="/contact">Contact</a>
            </nav>
        </div>
    </header>

    <main>
        <section class="page-header">
            <h2>{% block page_title %}Welcome{% endblock %}</h2>
            <p>{% block page_description %}Manage your team operations efficiently.{% endblock %}</p>
        </section>

        <section class="card">
            {% block content %}{% endblock %}
        </section>
    </main>

    <footer>
        &copy; {{ year if year else "2026" }} Operation Team. All rights reserved.
    </footer>

</body>
</html>
