{% extends "base.html" %}
{% block content %}
<style>
    .auth-container {
        max-width: 400px;
        margin: 60px auto;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        background: #fff;
        text-align: center;
    }

    .auth-container h3 {
        margin-bottom: 20px;
    }

    .auth-container input {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border: 1px solid #ccc;
        border-radius: 8px;
        font-size: 14px;
    }

    .auth-container button {
        width: 100%;
        padding: 10px;
        margin-top: 10px;
        border: none;
        border-radius: 8px;
        background: #4CAF50;
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    .auth-container button:hover {
        background: #45a049;
    }

    .auth-container a {
        display: block;
        margin-top: 15px;
        color: #007BFF;
        text-decoration: none;
        font-size: 14px;
    }

    .auth-container a:hover {
        text-decoration: underline;
    }

    .error-message {
        color: #e74c3c;
        background: #fdecea;
        padding: 10px;
        border-radius: 6px;
        margin-bottom: 15px;
        font-size: 14px;
    }
</style>

<div class="auth-container">
    <h3>Create Account</h3>

    {% if error %}
        <div class="error-message">{{ error }}</div>
    {% endif %}

    <form method="POST">
        <input name="username" placeholder="Username" required>
        <input name="password" type="password" placeholder="Password" required>
        <button type="submit">Register</button>
    </form>

    <a href="/login">Already have an account? Login</a>
</div>
{% endblock %}
