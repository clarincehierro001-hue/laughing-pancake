{% extends "base.html" %}

{% block title %}Register{% endblock %}

{% block content %}

<style>
    .auth-container {
        background: #fff;
        padding: 40px;
        border-radius: 12px;
        max-width: 400px;
        margin: auto;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        text-align: center;
    }

    .auth-title {
        font-size: 24px;
        font-weight: bold;
        margin-bottom: 10px;
    }

    .auth-subtitle {
        font-size: 14px;
        color: #666;
        margin-bottom: 25px;
    }

    .form-group {
        text-align: left;
        margin-bottom: 15px;
    }

    .form-group label {
        font-size: 14px;
        display: block;
        margin-bottom: 5px;
    }

    .form-group input {
        width: 100%;
        padding: 10px;
        border-radius: 6px;
        border: 1px solid #ccc;
        box-sizing: border-box;
    }

    .btn {
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 6px;
        background: #4facfe;
        color: white;
        font-weight: bold;
        cursor: pointer;
    }

    .btn:hover {
        background: #3a8dde;
    }

    .auth-footer {
        margin-top: 15px;
        font-size: 14px;
    }

    .auth-footer a {
        color: #4facfe;
        text-decoration: none;
    }

    .auth-footer a:hover {
        text-decoration: underline;
    }

    .password-note {
        text-align: left;
        font-size: 12px;
        color: #777;
        margin-top: -8px;
        margin-bottom: 15px;
    }
</style>

<div class="auth-container">
    <div class="auth-title">Create Account</div>
    <div class="auth-subtitle">Register to start using your app</div>

    <form method="POST" action="{{ url_for('register') }}">
        <!-- Add this later when CSRF is enabled -->
        <!-- <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"> -->

        <div class="form-group">
            <label for="username">Username</label>
            <input
                type="text"
                id="username"
                name="username"
                required
                maxlength="150"
                autocomplete="username"
            >
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input
                type="password"
                id="password"
                name="password"
                required
                minlength="8"
                autocomplete="new-password"
            >
        </div>

        <div class="password-note">
            Password must be at least 8 characters.
        </div>

        <button type="submit" class="btn">Register</button>
    </form>

    <div class="auth-footer">
        Already have an account?
        <a href="{{ url_for('login') }}">Login</a>
    </div>
</div>

{% endblock %}
