{% extends "base.html" %}
{% block content %}
<style>
    .auth-wrapper {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #4facfe, #00f2fe);
        height: 100vh;
    }

    .auth-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .auth-container {
        background: #fff;
        padding: 40px;
        border-radius: 12px;
        width: 100%;
        max-width: 400px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        text-align: center;
    }

    .auth-title {
        margin-bottom: 10px;
        font-size: 24px;
        font-weight: bold;
    }

    .auth-subtitle {
        margin-bottom: 25px;
        color: #666;
        font-size: 14px;
    }

    .form-group {
        text-align: left;
        margin-bottom: 15px;
    }

    .form-group label {
        display: block;
        margin-bottom: 5px;
        font-size: 13px;
    }

    .form-group input {
        width: 100%;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #ccc;
        font-size: 14px;
        transition: 0.3s;
    }

    .form-group input:focus {
        border-color: #4facfe;
        outline: none;
    }

    .form-options {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        margin-bottom: 20px;
    }

    .forgot-link {
        text-decoration: none;
        color: #4facfe;
    }

    .forgot-link:hover {
        text-decoration: underline;
    }

    .btn-primary {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 8px;
        background: #4facfe;
        color: white;
        font-size: 15px;
        cursor: pointer;
        transition: 0.3s;
    }

    .btn-primary:hover {
        background: #3a8dde;
    }

    .auth-footer {
        margin-top: 15px;
        font-size: 13px;
    }

    .auth-footer a {
        color: #4facfe;
        text-decoration: none;
    }

    .auth-footer a:hover {
        text-decoration: underline;
    }
</style>

<div class="auth-wrapper">
    <div class="auth-container">
        <h2 class="auth-title">Welcome Back</h2>
        <p class="auth-subtitle">Please login to your account</p>

        <form method="POST" class="auth-form" novalidate>
            <div class="form-group">
                <label for="username">Username</label>
                <input 
                    id="username"
                    name="username" 
                    type="text" 
                    placeholder="Enter your username" 
                    required 
                    autocomplete="username"
                >
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input 
                    id="password"
                    name="password" 
                    type="password" 
                    placeholder="Enter your password" 
                    required 
                    autocomplete="current-password"
                >
            </div>

            <div class="form-options">
                <label>
                    <input type="checkbox" name="remember"> Remember me
                </label>
                <a href="/forgot-password" class="forgot-link">Forgot password?</a>
            </div>

            <button type="submit" class="btn-primary">Login</button>
        </form>

        <p class="auth-footer">
            Don’t have an account? 
            <a href="/register">Register</a>
        </p>
    </div>
</div>
{% endblock %}
