{% extends "base.html" %}
{% block content %}
<style>
    :root {
        --primary: #2563eb;
        --primary-hover: #1d4ed8;
        --primary-soft: #dbeafe;
        --text-main: #111827;
        --text-muted: #6b7280;
        --border: #d1d5db;
        --surface: rgba(255, 255, 255, 0.92);
        --shadow: 0 20px 45px rgba(0, 0, 0, 0.12);
        --radius-lg: 20px;
        --radius-md: 12px;
        --radius-sm: 10px;
    }

    .auth-page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background:
            radial-gradient(circle at top left, rgba(255,255,255,0.35), transparent 30%),
            radial-gradient(circle at bottom right, rgba(255,255,255,0.22), transparent 35%),
            linear-gradient(135deg, #4facfe 0%, #00c6ff 45%, #2563eb 100%);
        font-family: "Segoe UI", Arial, sans-serif;
    }

    .auth-card {
        width: 100%;
        max-width: 430px;
        background: var(--surface);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255,255,255,0.35);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow);
        padding: 36px 32px;
    }

    .auth-header {
        text-align: center;
        margin-bottom: 28px;
    }

    .auth-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 58px;
        height: 58px;
        border-radius: 50%;
        margin-bottom: 14px;
        background: linear-gradient(135deg, var(--primary), #38bdf8);
        color: #fff;
        font-size: 24px;
        font-weight: 700;
        box-shadow: 0 10px 25px rgba(37, 99, 235, 0.28);
    }

    .auth-title {
        margin: 0;
        font-size: 28px;
        font-weight: 700;
        color: var(--text-main);
        letter-spacing: -0.02em;
    }

    .auth-subtitle {
        margin: 10px 0 0;
        font-size: 14px;
        color: var(--text-muted);
        line-height: 1.5;
    }

    .auth-form {
        margin-top: 6px;
    }

    .form-group {
        margin-bottom: 18px;
    }

    .form-label {
        display: inline-block;
        margin-bottom: 8px;
        font-size: 13px;
        font-weight: 600;
        color: #374151;
    }

    .input-wrapper {
        position: relative;
    }

    .form-input {
        width: 100%;
        padding: 13px 14px;
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        background: #fff;
        font-size: 14px;
        color: var(--text-main);
        transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
        box-sizing: border-box;
    }

    .form-input::placeholder {
        color: #9ca3af;
    }

    .form-input:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 4px var(--primary-soft);
    }

    .form-options {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin: 4px 0 22px;
        font-size: 13px;
        flex-wrap: wrap;
    }

    .checkbox-group {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: #374151;
    }

    .checkbox-group input[type="checkbox"] {
        accent-color: var(--primary);
        width: 15px;
        height: 15px;
        cursor: pointer;
    }

    .link {
        color: var(--primary);
        text-decoration: none;
        font-weight: 500;
        transition: color 0.2s ease;
    }

    .link:hover {
        color: var(--primary-hover);
        text-decoration: underline;
    }

    .btn-submit {
        width: 100%;
        border: none;
        border-radius: var(--radius-md);
        padding: 13px 16px;
        background: linear-gradient(135deg, var(--primary), #38bdf8);
        color: #fff;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
        box-shadow: 0 10px 20px rgba(37, 99, 235, 0.22);
    }

    .btn-submit:hover {
        transform: translateY(-1px);
        box-shadow: 0 14px 24px rgba(37, 99, 235, 0.28);
    }

    .btn-submit:active {
        transform: translateY(0);
    }

    .btn-submit:focus {
        outline: none;
        box-shadow: 0 0 0 4px var(--primary-soft);
    }

    .auth-footer {
        margin-top: 22px;
        text-align: center;
        font-size: 14px;
        color: var(--text-muted);
    }

    @media (max-width: 480px) {
        .auth-card {
            padding: 28px 20px;
            border-radius: 16px;
        }

        .auth-title {
            font-size: 24px;
        }

        .form-options {
            flex-direction: column;
            align-items: flex-start;
        }
    }
</style>

<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-badge">👋</div>
            <h1 class="auth-title">Welcome Back</h1>
            <p class="auth-subtitle">Sign in to continue to your account</p>
        </div>

        <form method="POST" class="auth-form" novalidate>
            <div class="form-group">
                <label for="username" class="form-label">Username</label>
                <div class="input-wrapper">
                    <input
                        id="username"
                        name="username"
                        type="text"
                        class="form-input"
                        placeholder="Enter your username"
                        required
                        autocomplete="username"
                    >
                </div>
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <div class="input-wrapper">
                    <input
                        id="password"
                        name="password"
                        type="password"
                        class="form-input"
                        placeholder="Enter your password"
                        required
                        autocomplete="current-password"
                    >
                </div>
            </div>

            <div class="form-options">
                <label class="checkbox-group" for="remember">
                    <input id="remember" type="checkbox" name="remember">
                    <span>Remember me</span>
                </label>

                <a href="{{ url_for('forgot_password') }}" class="link">Forgot password?</a>
				<a href="{{ url_for('register') }}" class="link">Create one</a>
            </div>

            <button type="submit" class="btn-submit">Sign In</button>
        </form>

        <p class="auth-footer">
            Don’t have an account?
            <a href="{{ url_for('register') if 'register' in globals() else '/register' }}" class="link">Create one</a>
        </p>
    </div>
</div>
{% endblock %}
