{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}

<style>
    .auth-container {
        background: #fff;
        padding: 40px;
        border-radius: 12px;
        max-width: 400px;
        margin: auto;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        text-align: center;
    }

    .auth-title {
        font-size: 24px;
        font-weight: bold;
        margin-bottom: 10px;
    }

    .auth-subtitle {
        font-size: 14px;
        color: #666;
        margin-bottom: 25px;
    }

    .form-group {
        text-align: left;
        margin-bottom: 15px;
    }

    .form-group label {
        font-size: 14px;
        display: block;
        margin-bottom: 5px;
    }

    .form-group input {
        width: 100%;
        padding: 10px;
        border-radius: 6px;
        border: 1px solid #ccc;
    }

    .remember {
        display: flex;
        align-items: center;
        justify-content: left;
        margin-bottom: 15px;
    }

    .remember input {
        margin-right: 8px;
    }

    .btn {
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 6px;
        background: #4facfe;
        color: white;
        font-weight: bold;
        cursor: pointer;
    }

    .btn:hover {
        background: #3a8dde;
    }

    .auth-footer {
        margin-top: 15px;
        font-size: 14px;
    }

    .auth-footer a {
        color: #4facfe;
        text-decoration: none;
    }

    .auth-footer a:hover {
        text-decoration: underline;
    }
</style>

<div class="auth-container">
    <div class="auth-title">Welcome Back</div>
    <div class="auth-subtitle">Login to your account</div>

    <form method="POST">
        <!-- CSRF (add later if enabled) -->
        <!-- <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"> -->

        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required>
        </div>

        <div class="remember">
            <input type="checkbox" name="remember">
            <label>Remember me</label>
        </div>

        <button type="submit" class="btn">Login</button>
    </form>

    <div class="auth-footer">
        Don’t have an account?
        <a href="{{ url_for('register') }}">Register</a>
    </div>
</div>

{% endblock %}
